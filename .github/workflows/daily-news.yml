name: Daily News Digest

on:
  schedule:
    - cron: '0 21 * * *'   # 21:00 UTC = 06:00 KST
  workflow_dispatch:        # 수동 실행 버튼

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install requests feedparser

      - name: Generate digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/news_digest.py

      - name: Commit & push
        run: |
          git config user.name "dojangin-bot"
          git config user.email "bot@dojangin"
          git add content-news scripts/seen_links.json
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "📰 오늘의 조선·도장 뉴스 $(TZ=Asia/Seoul date +%Y-%m-%d)"
            git push
          fi
